name: Test deployment tools

on:
  pull_request:
    paths:
      - "scripts/cloudflare-deploy.mjs"
      - "scripts/run-wrangler.mjs"
      - "scripts/wrangler-runner.mjs"
      - "scripts/verify-deployment.mjs"
      - ".dev.vars.example"
      - ".github/workflows/sync-edgeever-upstream.yml"
      - "tests/deployment-entrypoints.test.ts"
      - "tests/wrangler-runner.test.ts"
      - "tests/deployment-verify.test.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-tools.yml"
  push:
    branches:
      - main
    paths:
      - "scripts/cloudflare-deploy.mjs"
      - "scripts/run-wrangler.mjs"
      - "scripts/wrangler-runner.mjs"
      - "scripts/verify-deployment.mjs"
      - ".dev.vars.example"
      - ".github/workflows/sync-edgeever-upstream.yml"
      - "tests/deployment-entrypoints.test.ts"
      - "tests/wrangler-runner.test.ts"
      - "tests/deployment-verify.test.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-tools.yml"

permissions:
  contents: read

jobs:
  wrangler:
    name: Wrangler runner (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Launch project-local Wrangler
        run: bun scripts/run-wrangler.mjs --version

      - name: Test deployment tooling
        run: bun test tests/wrangler-runner.test.ts tests/deployment-verify.test.ts tests/deployment-entrypoints.test.ts
